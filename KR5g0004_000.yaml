front:
  text: 四卷同卷滿二
  hash: sha256:ffcbcbcd6a587cd7aa143724ad9c933fb46a2a20308bfaf72af12482de5e6969
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0004_HFL_000-001a, image: hfl/0875/0875-046.png}
body:
  text: 老君變化無極經太上金華天尊救劫護命經無上三天法師説隂育衆生妙經太上説青玄雷令法行因地妙經老君變化無極經老君變化無極中出處幽微黃房宫鍊形淑淑虛無同光景布行八極中真名一出會九公道理長遠樂無窮驂駕九龍車馬僮上登八重玉闕中金樓之臺望華山山上真人授我經教我學道身當清愼勿貪淫沒汝形清身潔己身長生老君之道自然並不求吾道經教名那得度災為種生賢者思之解其情針入縷出氣自明施寫有法隨時生秋收冬藏入黃庭窈窈冥冥氣合并老君變化易身形出在胡中作真經胡兒反叛無真誠朝降暮反結罪名部落強丁至死傾叩頭來前索求生老君執意欲不聽謫被赭衣在身形沐頭剔鬚為信盟絶其妻娶禁殺生若能從化過其名日中一食讀真經不得欺殆貪淫情若有犯法滅汝形胡兒弭伏道氣隆隨時轉運西漢中木子為姓諱口弓居在蜀郡成都宫赤名之域出凌隂弓長合世建天中乘三使六萬神崇置列三師有姓名二十四治氣當成分符券契律令名誅符伐廟有常刑老君正法道自明仙官簿録隨所請隂陽中經無人明唯有龍胎師度形白髮翩翩遊天庭羽翼開張毛衣成五色斑斑如列星璇璣玉衡正其名居東煙浪生海陽海水不流須風揚無有涯岸東西相不逆細流故深長汪汪巨海百谷王百川傾流水湯湯源出崑崙華隂堂隂氣踴躍難可當宜預防之過災殃得見太平升仙房乘雲駕龍到南陽飲食行厨布腹腸彈琴鼓弦舉樂觴要當解音别宫商角徵所生同室堂吾入幽河止泉元大道坦坦莫不聞養士天下皆稱臣弟子再拜請所問道有微氣生活人誠非下愚所可陳道氣綿綿難可遵布散流行如浮雲浮雲翩翩還入山亦無孔穴入無間細微之事難可言若解微者飛升仙比遊五嶽弱水邊弱水不度入殺人有知之明預防災與世相守樂無期玄命太清誰知之今世之人多愚癡七九數盡鬼賊來何不防間自修理苦言利行不相欺與己一别會何時道俗不同善自思丘山草穢難可治口中安十為良醫愷悌君子民所思但當披懷來趣之消除惡逆心無疑猶豫之子道不治龍變浮雲到南蠻江水枯竭人民單鬼賊遊行在民間聊亂止氣無人分師君一出誅盡群爾乃太平見真君有福過度為種人條名上白太上君賜與符籙護身形思如呼之恆隨人敬如侍之與相親真氣來附成萬神與天相保升崑崙驂駕九龍行如雲鬱鬱之童至遼東時欲從急驛馬通千里相逐如飛蜂毒害之氣難可衝道路隔塞絶不通奈何此世思九公母能養子恩意同無偏無黨可相從靈禽辟邪除群凶姦臣賊子入地衝爾乃太平氣清公真君當出别人容三五七九內外同養生之法氣相從和順上下無災衝人多不解妄説空西事未訖折復東持心猶豫無所從大災奄至路不通汝欲避世華隂東遊上高山望海水日出浩汗不可視令人目暗犯過罪魚藏深淵貪餌死南方不但自食尾肝心獨活舍如死金容城中有白雉世之所希人所視禁地之物不可底貪淫愛色心斷亂強尸縱橫令人歎不能清己呼天怨吾道清潔選種民少有明解應吾文南到淮揚經孟津浮橋翩翩在水巔過度萬姓無留難條牒姓名詣津門宜名詐稱送司官推問情實盡其元人心歸情還本根根深固久物自然自然之氣出虛無魯道蕩蕩合與俱賴得赤子相接扶解脫羅網六翮舒唳天高飛詣九都九都之要誰能舒仙人王喬處石廬師事老子合生符歷觀帝世知沉浮有道君子心不憂蕩蕩滌滌如長流百川之水歸海中海水瀺灂志無窮無窮之東有沃焦沃焦所受無不消變散形身作浮雲浮雲翩翩還入山結氣谷口為甘泉事會之溟家無言神男玉女侍在邊扶助男女成萬神萬神皆生為真人真人已成飛升仙遊於五嶽乘紫雲驂駕六龍會天門門有害氣不敢前十往十死初不還汝欲入門依魯斑天下名巧吾語言凌隂之室在中丹內外相通無留難同氣合音舒道元道之綿綿誰能遵十室之邑無中人令吾道氣屈不伸怒吾師鬼咎吾臣呼行選種不精勤太平垂至事當分條牒姓名言太清功勞行狀與集並玉曆之中有生名三氣當備愛子形不行三五七九生那得過度見太平隂陽中經事難明時有開解能思精出陽入隂至玄冥八極之內有九城九宫之內應天經三氣五氣令身生七九去災除殃丁天歷運度隨時清三師出教給吏兵守宅將軍繞舍營辟斥故氣却邪精武夷來福在中庭除災去害道日明名顯遠殊世有榮子孫昌隆輔相𡖖赤車使者在門亭左右使從道門旁通事書佐處中央中元之君攝紀綱開通屈滯到故鄉處所安樂命延長歷觀五帝治漢中大樹蓊蓊布名張垂枝布葉隂覆陽四海來會為柱梁勸化男女善相將接息八木氣當王正法天地立紀綱乾坤所主正隂陽道在其中名布行凌隂之室色玄黃芝草蒙蒙覆宫堂金樓玉闕俠兩傍銅人翁仲坐相望俠守公門嚴如霜赤門赫赫誰能當賢人君子字道長防災除害思元陽氣流溢布身華光身生吾羽飛雲行上謁老君山中黃遊觀南嶽宿間房仙人王喬共遨翔西到廣漢歷長城長安城中胡馬鳴奮頭銜勒人民驚民驚奔走空土城父子為虎因時營觀世浮沉發公名時世浩擾氣不寧溫寒不適在人形變發坐逆罰貪夫威令世畏法禁拘有道之士心無憂蕩蕩滌滌處長流水之東流無息休翩翩揚舟隨風流櫓棹相催行如浮轉相過度無稽留稽滯不去必沉浮傷子無知益人憂南度江海建鄴城故時大樂子孫榮不承權輿至死傾日南瘴氣草不生飛鳥不過沒人形遠嫌避害可長生與道相守建功名莫貪財利色欲情貞潔守節志當清爾乃過度見太平太平真君復能明整理文書應鵠鳴二十四治會陽平主者齎籍户言名除死著生詣太清文字教案令分明遷故迎新給所請有功增録護群生男官女官有别名聰明主者鍊人形若有明解來求生開心同化首凝誠條名上簿過度生不得壅過塞人情主者明順思書經若有不法結罪名鞭杖在身病殃丁親民之職心當平不得鬲戾嫉妬情貪淫愛色沒汝形冗散祭酒新故民素性暗塞不識真論説道元狂惑人口舌陋露俗人間招來禍害三考前同屬道氣不蒙恩不能悔咎上呼怨敕吾主者精斷彈善惡異名列狀言吾有司官在人間當驅治之至死傾上多煩欲無忠貞民困於役不農耕種植失時花無榮𦚠卵半傷結死名穀如金玉斷之糧人民相視色責黃心愁意苦劇遭喪思亂之世無紀綱君貪臣濁失法常世欲變改無忠良忠臣孝子深隱藏不預世事託佯狂姦臣賊子志飛揚義言自陳休紀綱執正立權舒中腸群寮困頓失義方士卒百上困狼當負土躡水啼吟行百川之流奔沼城真來之衝難可當火失其明日無光封邑齊土國為王齊人感歎身摧傷養羊為虎鼠為狼變化姓字易其常西度名水歷火行深林還谷多毒霜殺戮百草葉枯黃孟春正月合天罡回轉斗樞隨朝陽養育群生壽命長與天相保神聖將韓終范蠡相輔匡飲食九藥辟穀糧名山可處石室堂前臨源流道里長混沌相隨到海陽海水不流湛如漿源流減減無人當不甜不苦無臭香中有赤子過度生吾之為道不人情正法天地身聰明道出微妙入玄宫綿邈攸長難可窮譬如百川入海江不逆細流致其深好學之士慕清忠謙卑順下志在心不共並心精其元道吾好生愛善人和民抱朴守素貞許由洗耳於河濱清潔有素絶不群枕石漱流靜思真採取芝英成萬神服食三微飲神丹壽命無窮與天連遊戲無極八重間八重離樓屈復伸九重之裏窈無人混沌之氣誰能分演散隂陽舒道元養育肢體生華根根生固久應自然自然之氣出崑崙山北絶苦有溫泉療治萬病除殃患犯罪之人更福原老君變化無極經
